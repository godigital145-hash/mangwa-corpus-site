name = "mangwa-corpus"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ── D1 Database ────────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "mangwa-corpus-db"
database_id = "f98e7e76-4d85-45e2-b5fb-422ac9f133c9"

# ── R2 Bucket (media) ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mangwa-corpus-media"

# ── KV Namespace (cache) ───────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "222c0769cfea47c89354c4c4ff6013ae"

# ── Secrets (à définir via `wrangler secret put ADMIN_PASSWORD`) ───────────────
# ADMIN_PASSWORD est un secret — ne pas le mettre ici en clair

# ── Variables d'environnement ──────────────────────────────────────────────────
[vars]
PUBLIC_SITE_URL = "https://mangwa-corpus.pages.dev"

# ── Environnement de preview (local) ──────────────────────────────────────────
[env.preview]
name = "mangwa-corpus-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "mangwa-corpus-db"
database_id = "f98e7e76-4d85-45e2-b5fb-422ac9f133c9"

[[env.preview.r2_buckets]]
binding = "MEDIA"
bucket_name = "mangwa-corpus-media-preview"

[[env.preview.kv_namespaces]]
binding = "CACHE"
id = "222c0769cfea47c89354c4c4ff6013ae"

[env.preview.vars]
PUBLIC_SITE_URL = "https://preview.mangwa-corpus.pages.dev"
